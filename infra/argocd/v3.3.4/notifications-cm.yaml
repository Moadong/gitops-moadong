apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
data:
  service.webhook.discord: |
    url: $DISCORD_WEBHOOK_URL
    headers:
      - name: Content-Type
        value: application/json
  template.app-sync-succeeded: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "content": "✅ **Argo CD Sync Succeeded**",
            "embeds": [{
              "title": "{{.app.metadata.name}}",
              "description": "Application **{{.app.metadata.name}}** has successfully synced to revision **{{.app.status.sync.revision}}**.",
              "color": 3066993,
              "fields": [
                { "name": "Project", "value": "{{.app.spec.project}}", "inline": true },
                { "name": "Status", "value": "{{.app.status.sync.status}}", "inline": true }
              ]
            }]
          }
  template.app-sync-failed: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "content": "❌ **Argo CD Sync Failed**",
            "embeds": [{
              "title": "{{.app.metadata.name}}",
              "description": "Application **{{.app.metadata.name}}** sync has failed.",
              "color": 15158588,
              "fields": [
                { "name": "Project", "value": "{{.app.spec.project}}", "inline": true },
                { "name": "Status", "value": "{{.app.status.sync.status}}", "inline": true }
              ]
            }]
          }
  trigger.on-sync-succeeded: |-
    - description: Application sync succeeded
      send: [app-sync-succeeded]
      when: app.status.operationState != nil and app.status.operationState.phase in ['Succeeded']
  trigger.on-sync-failed: |-
    - description: Application sync failed
      send: [app-sync-failed]
      when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
