apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
data:
  service.webhook.discord-dev: |
    url: $DISCORD_WEBHOOK_URL_DEV
    headers:
      - name: Content-Type
        value: application/json
  service.webhook.discord-prod: |
    url: $DISCORD_WEBHOOK_URL_PROD
    headers:
      - name: Content-Type
        value: application/json
  template.app-sync-succeeded: |
    webhook:
      discord-dev:
        method: POST
        body: |
          {
            "content": "✅ **[DEV] Argo CD Sync Succeeded**",
            "embeds": [{
              "title": "{{.app.metadata.name}}",
              "description": "Application **{{.app.metadata.name}}** successfully synced.",
              "color": 3066993,
              "fields": [
                { "name": "Project", "value": "{{.app.spec.project}}", "inline": true },
                { "name": "Status", "value": "{{.app.status.sync.status}}", "inline": true }
              ]
            }]
          }
      discord-prod:
        method: POST
        body: |
          {
            "content": "✅ **[PROD] Argo CD Sync Succeeded**",
            "embeds": [{
              "title": "{{.app.metadata.name}}",
              "description": "Application **{{.app.metadata.name}}** successfully synced.",
              "color": 3066993,
              "fields": [
                { "name": "Project", "value": "{{.app.spec.project}}", "inline": true },
                { "name": "Status", "value": "{{.app.status.sync.status}}", "inline": true }
              ]
            }]
          }
  template.app-sync-failed: |
    webhook:
      discord-dev:
        method: POST
        body: |
          {
            "content": "❌ **[DEV] Argo CD Sync Failed**",
            "embeds": [{
              "title": "{{.app.metadata.name}}",
              "description": "Application **{{.app.metadata.name}}** sync failed.",
              "color": 15158588
            }]
          }
      discord-prod:
        method: POST
        body: |
          {
            "content": "❌ **[PROD] Argo CD Sync Failed**",
            "embeds": [{
              "title": "{{.app.metadata.name}}",
              "description": "Application **{{.app.metadata.name}}** sync failed.",
              "color": 15158588
            }]
          }
  trigger.on-sync-succeeded: |-
    - description: Application sync succeeded
      send: [app-sync-succeeded]
      when: app.status.operationState != nil and app.status.operationState.phase in ['Succeeded']
  trigger.on-sync-failed: |-
    - description: Application sync failed
      send: [app-sync-failed]
      when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
