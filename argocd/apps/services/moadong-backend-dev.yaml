apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: moadong-backend-dev
  namespace: argocd
  labels:
    app: moadong
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord-dev: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord-dev: ""
    notifications.argoproj.io/subscribe.on-health-degraded.discord-dev: ""
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Moadong/gitops-moadong.git
    targetRevision: HEAD
    path: backend/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: moadong-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
