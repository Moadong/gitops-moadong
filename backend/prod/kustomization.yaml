apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: moadong

resources:
  - ../base
  - issuer-prod.yaml

patches:
  - path: deployment.yaml
    target:
      kind: Deployment
      name: moadong
  - path: ingress.yaml
    target:
      kind: Ingress
      name: moadong-ingress

images:
  - name: moadong/moadong
    newName: moadong/moadong-release
    newTag: latest
  - name: moadong/moadong-release
    newName: moadong/moadong-release
    newTag: v1.3.0
