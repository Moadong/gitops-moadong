apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: moadong-service-monitor
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: moadong
  endpoints:
    - port: actuator
      path: /actuator/prometheus
      interval: 30s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: instance
          action: replace
